name: Daily Paper Search

on:
  schedule:
    - cron: "0 23 * * *"   # 毎日 UTC 23:00 = 日本時間 08:00
  workflow_dispatch:

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 論文検索 & Slack 投稿
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python search_and_notify.py

      - name: seen_papers.json をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_papers.json
          git diff --cached --quiet || git commit -m "update seen_papers.json [skip ci]"
          git push
